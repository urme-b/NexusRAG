# NexusRAG configuration reference.
# The running system reads settings from environment variables via
# pydantic-settings (src/nexusrag/config.py); this file documents the
# defaults and the shape of each section.

llm:
  base_url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${LLM_MODEL:llama3.2:3b}
  temperature: ${LLM_TEMPERATURE:0.1}
  max_tokens: ${LLM_MAX_TOKENS:768}
  timeout: ${LLM_TIMEOUT:60}

embedding:
  model: ${EMBEDDING_MODEL:BAAI/bge-small-en-v1.5}
  device: cpu
  batch_size: 32

ingestion:
  chunk_size: 1200
  chunk_overlap: 300
  min_chunk_size: 200
  supported_formats:
    - .pdf
    - .docx
    - .txt
    - .md

retrieval:
  top_k: 8
  max_query_length: 2000

self_correction:
  enabled: true
  confidence_tau: 0.55       # re-retrieve when top dense score is below this
  feedback_docs: 5           # documents used for query expansion
  feedback_terms: 10         # expansion terms added
  grounding_enabled: false   # NLI faithfulness check (opt-in)
  grounding_model: cross-encoder/nli-deberta-v3-small
  grounding_threshold: 0.5

storage:
  lancedb_path: ${LANCEDB_PATH:./data/lancedb}
  table_name: chunks

api:
  host: ${API_HOST:127.0.0.1}
  port: ${API_PORT:8000}
  cors_origins:
    - "http://localhost:8000"
    - "http://127.0.0.1:8000"

logging:
  level: ${LOG_LEVEL:INFO}
  format: json
  file: null

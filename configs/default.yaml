# NexusRAG Configuration

llm:
  base_url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${LLM_MODEL:llama3.2:3b}  # Smaller model for 8GB RAM systems
  temperature: 0.1
  max_tokens: 512  # Reduced for faster, concise responses
  timeout: 60

embedding:
  model: ${EMBEDDING_MODEL:all-MiniLM-L6-v2}
  device: cpu
  batch_size: 16  # Reduced for lower memory usage

ingestion:
  chunk_size: 512
  chunk_overlap: 50
  min_chunk_size: 100
  supported_formats:
    - .pdf
    - .docx

retrieval:
  top_k: 3  # Reduced for speed
  rerank_top_k: 2
  similarity_threshold: 0.3
  max_query_length: 512

self_correction:
  enabled: true
  max_iterations: 2  # Reduced for speed
  relevance_threshold: 0.4
  reformulation_enabled: true

storage:
  lancedb_path: ${LANCEDB_PATH:./data/lancedb}
  table_name: documents

api:
  host: ${API_HOST:0.0.0.0}
  port: ${API_PORT:8000}
  cors_origins:
    - "*"

logging:
  level: ${LOG_LEVEL:INFO}
  format: json
  file: null

name: Publish to PyPI

# Publishes a wheel + sdist to PyPI when a version tag is pushed (e.g. v1.0.0).
# Authentication is via PyPI Trusted Publishing (OIDC) — no API token is stored.
# The project owner must first configure a Trusted Publisher for project
# "nexusrag" on PyPI (repo urme-b/NexusRAG, workflow publish.yml, environment
# pypi) before the first tag will publish.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

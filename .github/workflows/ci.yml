name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    name: dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: python -m pip install pip-audit
      - name: Audit pinned runtime dependencies
        # CVE-2025-3000: unpatched torch.jit.script advisory (transitive via
        # sentence-transformers). NexusRAG never calls torch.jit.script and no
        # fixed torch release exists yet; Dependabot will surface a bump.
        run: pip-audit -r requirements-runtime.lock --strict --ignore-vuln CVE-2025-3000

  quality:
    name: lint, type-check, test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev extras
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type-check
        run: mypy src/

      - name: Test
        run: pytest tests/ -q

      - name: README test count in sync
        run: |
          claimed=$(grep -oE '[0-9]+ tests' README.md | head -1 | grep -oE '[0-9]+')
          actual=$(pytest tests/ --co -q 2>/dev/null | grep -oE '[0-9]+ tests collected' | grep -oE '[0-9]+')
          echo "README claims $claimed, collected $actual"
          test "$claimed" = "$actual"

  eval-smoke:
    name: eval smoke (offline sample)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with dev and eval extras
        run: python -m pip install -e ".[dev,eval]"

      - name: Run vendored offline sample
        run: python -m nexusrag.eval.run --sample

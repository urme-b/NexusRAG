name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    name: dependency audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.11"
      - name: Install project and pip-audit
        run: |
          python -m pip install .
          python -m pip install pip-audit
      - name: Audit resolved dependencies
        # CVE-2025-3000: unpatched torch.jit.script advisory (transitive via
        # sentence-transformers). NexusRAG never calls torch.jit.script and no
        # fixed torch release exists yet; the ignore is revisited when one ships.
        run: pip-audit --strict --ignore-vuln CVE-2025-3000

  quality:
    name: lint, type-check, test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev extras
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Type-check
        run: mypy src/

      - name: Test
        run: pytest tests/ -q --cov=scinexusrag --cov-branch --cov-fail-under=60

      - name: README test count in sync
        run: |
          claimed=$(grep -oE '[0-9]+ tests' README.md | head -1 | grep -oE '[0-9]+')
          actual=$(pytest tests/ --co -q 2>/dev/null | grep -oE '[0-9]+ tests collected' | grep -oE '[0-9]+')
          echo "README claims $claimed, collected $actual"
          test "$claimed" = "$actual"

  eval-gate:
    name: eval regression gate (offline sample)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with dev and eval extras
        run: python -m pip install -e ".[dev,eval]"

      # Reruns the vendored SciFact retrieval + evidence-detection sample
      # (seed 0, CPU, deterministic) and fails if any metric drops below the
      # committed floor in benchmarks/thresholds.json.
      - name: Run eval regression gate
        run: python -m scinexusrag.eval.gate
